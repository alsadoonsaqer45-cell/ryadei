        :root {
            --primary: #bcff00;
            /* Neon Lime - Athletic vibe */
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
        }

        body {
            font-family: 'Tajawal', 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .text-neon {
            color: var(--primary);
        }

        .bg-neon {
            background-color: var(--primary);
        }

        .border-neon {
            border-color: var(--primary);
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #map {
            height: 300px;
            width: 100%;
            border-radius: 1.5rem;
            transition: all 0.5s ease;
        }

        .tab-active {
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .toast-container {
            position: fixed;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }

        .toast {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.5);
            animation: toastIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
            pointer-events: all;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .toast-success {
            border-left: 4px solid var(--primary);
        }

        .toast-error {
            border-left: 4px solid #ef4444;
        }

        .toast-info {
            border-left: 4px solid #3b82f6;
        }
    </style>

        function safeCreateIcons() {
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                lucide.createIcons();
            }
        }


        function syncUserData() {
            if (!db || !userData || !userData.email) return;
            const userKey = userData.email.replace(/\./g, ',');
            db.ref(`users/${userKey}`).on('value', (snap) => {
                if (snap.exists()) {
                    const newData = snap.val();
                    // Merge carefully: don't overwrite if newData is empty/malformed
                    if (newData && newData.name) {
                        userData = Object.assign({}, userData, newData);
                        localStorage.setItem('ryadi_user', JSON.stringify(userData));
                        if (currentView === 'profile') renderProfileData();
                        if (currentView === 'home') renderHomeHeader();
                    }

                }
            });
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')

                    .catch(e => console.error('⚠️ SW Registration Failed', e));
            });
        }

        // Notification System
        async function askNotificationPermission() {
            if (!('Notification' in window)) return;
            const res = await Notification.requestPermission();
            if (res === 'granted') {
                showToast('تم تفعيل التنبيهات بنجاح 🔔');
                scheduleTestNotification();
            } else {
                showToast('تم رفض التنبيهات ❌', 'error');
            }
        }

        function scheduleTestNotification() {
            if (Notification.permission === 'granted') {
                setTimeout(() => {
                    new Notification('رياضي | Ryadi', {
                        body: 'تم تفعيل التنبيهات! سنقوم بتذكيرك بموعد تمرينك القادم 🏃‍♂️',
                        icon: 'https://images.unsplash.com/photo-1543353071-873f17a7a088?w=192'
                    });
                }, 2000);
            }
        }

        function initNotificationScheduler() {
            setInterval(() => {
                const now = new Date();
                const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                const dayIdx = now.getDay(); // 0 = Sunday ... 6 = Saturday

                // 1. Check Group Reminders
                if (typeof ryadiGroups !== 'undefined') {
                    ryadiGroups.forEach(group => {
                        const isMember = (group.memberData && typeof group.memberData.find === 'function') ? group.memberData.find(m => m.email === (userData ? userData.email : '')) : null;

                        if (isMember && group.time === timeStr) {
                            triggerAppNotification('بداية التمرين! 🏃‍♂️', `حان موعد تمرينك في مجموعة "${group.name}" في ${group.location}.`);
                        }
                    });
                }

                // 2. Check Exercise Day Reminders (9:00 AM)
                if (userData && userData.selectedDays && userData.selectedDays.includes(dayIdx) && timeStr === "09:00") {

                    triggerAppNotification('يوم تمرين جديد! ⚡', 'صباح النشاط! لا تنسى تمرينك اليوم لتحقيق هدفك.');
                }
            }, 60000);
        }

        function triggerAppNotification(title, body) {
            if (Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification(title, {
                        body: body,
                        icon: 'https://images.unsplash.com/photo-1543353071-873f17a7a088?w=192',
                        vibrate: [200, 100, 200]
                    });
                });
            }
        }

        function showToast(msg, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast toast-${type} shadow-neon/10`;
            const icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'alert-circle' : 'info');
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-5 h-5 ${type === 'success' ? 'text-neon' : (type === 'error' ? 'text-red-500' : 'text-blue-500')}"></i>
                <span>${msg}</span>
            `;
            container.appendChild(toast);
            safeCreateIcons();
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px) scale(0.9)';
                toast.style.transition = 'all 0.5s ease';

        function completeSubscription(id) {
            const meal = mealsData.find(m => m.id === id);
            const name = document.getElementById('sub-name').value;
            const card = document.getElementById('sub-card').value;
            const exp = document.getElementById('sub-exp').value;
            const cvv = document.getElementById('sub-cvv').value;

            if (!name || !card || !exp || !cvv) return showToast('يرجى ملء جميع البيانات لإتمام الاشتراك', 'error');

            const order = {
                id: Date.now(),
                mealId: id,
                restaurant: meal.restaurant,
                title: meal.title || '',
                price: meal.price,
                date: new Date().toLocaleDateString('ar-SA'),
                customer: name,
                email: (userData && userData.email) ? userData.email : 'unknown',

                cardMasked: '**** ' + card.slice(-4)
            };

            if (!userData.subscriptions) userData.subscriptions = [];
            userData.subscriptions.push(order);
            userData.paymentInfo = { name, cardMain: order.cardMasked }; // Save masked info

            if (db) {
                // Save to user node
                db.ref('users/' + userData.email.replace(/\./g, ',')).update(userData);
                // Save to global global monitor for admin
                db.ref('global_subscriptions').push(order);
            }

            localStorage.setItem('ryadi_user', JSON.stringify(userData));
            document.getElementById('sub-modal').remove();
            showToast(`تم الاشتراك بنجاح في ${meal.restaurant}! ستصلك أول وجبة غداً. 🍱`);

        function toggleTracking() {
            if (!isTracking) {
                isTracking = true;

                // Real Continuous GPS Watch
                watchId = navigator.geolocation.watchPosition(updatePosition, (err) => console.log(err), {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 15000
                });

                timerInterval = setInterval(updateTimeDisplay, 1000);
            } else {
                isTracking = false;
                navigator.geolocation.clearWatch(watchId);
                clearInterval(timerInterval);
                document.getElementById('btn-start').classList.add('bg-neon', 'pulse-neon');
                document.getElementById('btn-start').classList.remove('bg-red-500');

            saveTrackingState();
            safeCreateIcons();

        function saveTrackingState() {
            const state = {
                isTracking,
                userSteps,
                userKM,
                startTime: startTime ? startTime.toISOString() : null,
                goalReachedAlerted
            };
            localStorage.setItem('ryadi_tracking_state', JSON.stringify(state));
        }

        function resumeTracking() {
            const saved = localStorage.getItem('ryadi_tracking_state');
            if (!saved) return;
            const state = JSON.parse(saved);
            if (!state.isTracking) return;

            isTracking = true;
            userSteps = state.userSteps || 0;
            userKM = state.userKM || 0;
            startTime = state.startTime ? new Date(state.startTime) : null;
            goalReachedAlerted = state.goalReachedAlerted || false;

            watchId = navigator.geolocation.watchPosition(updatePosition, (err) => console.log(err), {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 15000
            });

            timerInterval = setInterval(updateTimeDisplay, 1000);

            // Wait for DOM
            setTimeout(() => {
                const btn = document.getElementById('btn-start');
                if (btn) {
                    btn.classList.remove('bg-neon', 'pulse-neon');
                    btn.classList.add('bg-red-500');
                    const icon = document.getElementById('tracking-icon');
                    if (icon) icon.setAttribute('data-lucide', 'square');
                    const status = document.getElementById('session-status');
                    if (status) status.innerText = 'يتم استئناف التتبع الحقيقي...';
                    safeCreateIcons();
                }
                updateStatsUI();
                updateTimeDisplay();
            }, 500);
        }

        function updatePosition(position) {
            if (!isTracking) return;

            // 1. Accuracy Filter - Ignore low precision points (e.g., > 30 meters error)
            const accuracy = position.coords.accuracy || 100;
            if (accuracy > 30) {
                console.warn(`🛰️ Ignoring low accuracy point: ${accuracy.toFixed(1)}m`);
                return;
            }

            const current = { 
                lat: position.coords.latitude, 
                lng: position.coords.longitude,
                timestamp: position.timestamp || Date.now()
            };

            if (lastPosition) {
                const dist = calculateDistance(lastPosition.lat, lastPosition.lng, current.lat, current.lng);
                
                // 2. Speed Filter - Ignore impossible jumps (> 15 m/s or 54 km/h)
                const timeDiff = (current.timestamp - lastPosition.timestamp) / 1000; // seconds
                if (timeDiff > 0) {
                    const speed = (dist * 1000) / timeDiff; // m/s
                    if (speed > 15) {
                        console.warn(`🛰️ Ignoring impossible speed: ${speed.toFixed(1)} m/s`);
                        return;
                    }
                }

                // 3. Precision threshold: only count movements > 2m to reduce GPS jitter (static drift)
                // We use 0.002 km (2 meters) as a safer threshold for static jitter
                if (dist > 0.002) { 
                    userKM += dist;
                    // Improve step calculation: accumulate precisely without flooring until display
                    // 1250 steps per KM (standard)
                    const newSteps = dist * 1250;
                    userSteps += newSteps; 
                    
                    // Batch UI updates
                    requestAnimationFrame(() => {
                        updateStatsUI();
                        updateTracksDistances(current);
                        saveTrackingState();
                    });
                    lastPosition = current; 
                }
            } else {
                lastPosition = current; // Initial position
            }
            userCoords = current; 
            updateMapToFocus(current);
        }

        // Math & GPS Helpers (High Precision Haversine)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const lat1Rad = lat1 * Math.PI / 180;
            const lat2Rad = lat2 * Math.PI / 180;

            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1Rad) * Math.cos(lat2Rad) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function getUserLocation() {
            const riyadh = { lat: 24.7136, lng: 46.6753 };
            
            if (navigator.geolocation) {
                const timeoutId = setTimeout(() => {
                    console.warn("GPS Timeout - Using Riyadh Default");
                    if (!userCoords) {
                        userCoords = riyadh;
                        renderTracks(userCoords);
                        updateMapToFocus(userCoords);
                        renderHomeGyms();
                    }
                }, 5000);

                navigator.geolocation.getCurrentPosition(pos => {
                    clearTimeout(timeoutId);
                    userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    renderTracks(userCoords);
                    updateMapToFocus(userCoords);
                    renderHomeGyms();

                    if (isTracking) updatePosition(pos);
                }, (err) => {
                    clearTimeout(timeoutId);
                    console.log("GPS Error - Using Riyadh Default", err);
                    userCoords = riyadh;
                    renderTracks(userCoords);
                    renderHomeGyms();
                }, { 
                    enableHighAccuracy: true,
                    timeout: 20000, 
                    maximumAge: 0 
                });
            } else {
                userCoords = riyadh;
                renderTracks(userCoords);
            }
        }


        function updateMapToFocus(coords) {

                map.setView([coords.lat, coords.lng], 15);
                if (window.userMarker) map.removeLayer(window.userMarker);

            }
        }

        async function adminResetSystemUsers() {
            if (!confirm('⚠️ تحذير: سيتم حذف جميع المستخدمين من النظام ما عدا حسابك الحالي. هل أنت متأكد؟')) return;
            if (!confirm('تأكيد نهائي: لا يمكن التراجع عن هذه الخطوة!')) return;

            const adminEmail = userData.email;
            const userKey = adminEmail.replace(/\./g, ',');

            if (db) {
                const usersRef = db.ref('users');
                const snap = await usersRef.once('value');
                if (snap.exists()) {
                    const allUsers = snap.val();
                    const newUsers = { [userKey]: allUsers[userKey] };
                    await usersRef.set(newUsers);
                    showToast('تم تصفير المستخدمين بنجاح ✅');
                    renderAdminHub();
                }
            }
        }

        function toggleDay(i) {
            const b = document.querySelector(`[data-day="${i}"]`);
            if (selectedDays.includes(i)) { selectedDays = selectedDays.filter(d => d !== i); b.classList.remove('bg-neon', 'text-dark'); }

        let currentObStep = 1;
        let selectedDays = [];
        let finalObData = {};
        function nextObStep() {
            if (currentObStep === 1) {
                const nameEl = document.getElementById('ob-name');
                const emailEl = document.getElementById('ob-email');
                const passEl = document.getElementById('ob-pass');
                const name = nameEl.value;
                const email = emailEl.value;
                const pass = passEl.value;

                if (!name || !email || !pass) return showToast('البيانات مطلوبة', 'error');

                // Check if user exists in Cloud (Login)
                if (db) {
                    const userRef = db.ref('users/' + email.replace(/\./g, ','));
                    userRef.once('value', (snap) => {
                        if (snap.exists()) {
                            const data = snap.val();

        // --- Challenge Performance Logic ---
        function startPerformanceChallenge(id) {
            if (isTracking) return showToast('يرجى إيقاف تمرينك العادي أولاً لبدء التحدي!', 'error');

            isChallengeActive = true;
            challengeDist = 0;
            challengeTime = 0;
            lastPosition = null;

            document.getElementById('ch-start-btn').classList.add('hidden');
            document.getElementById('ch-stop-btn').classList.remove('hidden');
            document.getElementById('ch-active-panel').classList.remove('hidden');

            // Start GPS Watch for challenge
            watchId = navigator.geolocation.watchPosition((pos) => {
                const current = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                if (lastPosition) {
                    const d = calculateDistance(lastPosition.lat, lastPosition.lng, current.lat, current.lng);
                    if (d > 0.001) { // 1 meter
                        challengeDist += d;
                        updateChallengeUI();
                        if (challengeDist >= challengeGoal) {
                            stopPerformanceChallenge(id);
                        }
                        lastPosition = current; // Corrected: Only update when threshold met
                    }
                } else {
                    lastPosition = current;
                }
                userCoords = current;
            }, (err) => console.log(err), { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 });

            challengeInterval = setInterval(() => {
                challengeTime++;
                updateChallengeUI();
            }, 1000);
        }

        function updateChallengeUI() {
            const timeEl = document.getElementById('ch-timer');
            const distEl = document.getElementById('ch-dist');
            const barEl = document.getElementById('ch-bar-perf');

            if (timeEl) {
                const mins = Math.floor(challengeTime / 60).toString().padStart(2, '0');
                const secs = (challengeTime % 60).toString().padStart(2, '0');
                timeEl.innerText = `${mins}:${secs}`;
            }
            if (distEl) distEl.innerText = challengeDist.toFixed(2) + ' كم';
            if (barEl) barEl.style.width = Math.min((challengeDist / challengeGoal) * 100, 100) + '%';
        }

        function stopPerformanceChallenge(id, manual = false) {
            navigator.geolocation.clearWatch(watchId);
            clearInterval(challengeInterval);
            isChallengeActive = false;

            if (!manual && challengeDist >= challengeGoal) {
                const finalTimeStr = document.getElementById('ch-timer').innerText;
                const achievement = {
                    id: Date.now(),
                    title: 'تحدي ماراثون الحي',
                    dist: challengeGoal + ' كم',
                    time: finalTimeStr,
                    rawTime: challengeTime,
                    date: new Date().toLocaleDateString('ar-SA')
                };

                if (!userData.achievements) userData.achievements = [];
                userData.achievements.unshift(achievement);

                if (db) db.ref('users/' + userData.email.replace(/\./g, ',')).update(userData);
                localStorage.setItem('ryadi_user', JSON.stringify(userData));

                showToast(`إنجاز عظيم! أنهيت التحدي في ${finalTimeStr} دقيقة. 🎉\nتمت إضافة الإنجاز لبروفايلك.`);
            }

            switchView('challenges'); // Refresh UI
        }

        function getRelativeTime(timeStr) {
            const [time, ampm] = timeStr.split(' ');
            let [hours, minutes] = time.split(':').map(Number);
            if (ampm === 'PM' && hours !== 12) hours += 12;
            if (ampm === 'AM' && hours === 12) hours = 0;

            const now = new Date();
            const target = new Date();
            target.setHours(hours, minutes, 0, 0);

            // If target time is earlier today, assume it's for tomorrow
            if (target < now) target.setDate(target.getDate() + 1);

            const diffMs = target - now;
            const diffMins = Math.floor(diffMs / (1000 * 60));
            const diffHours = Math.floor(diffMins / 60);

            if (diffHours > 0) {
                return `يبدأ بعد ${diffHours} ${diffHours === 1 ? 'ساعة' : diffHours === 2 ? 'ساعتين' : 'ساعات'}`;
            } else if (diffMins > 0) {
                return `يبدأ بعد ${diffMins} دقيقة`;
            } else {
                return 'بدأ الآن 🏃‍♂️';
            }
        }

                        ` : ''}
                    </div>

                    <div class="flex justify-between items-center pt-2">
                        <div class="flex flex-col">
                            <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest">السعة</span>
                            <span class="text-xs font-bold font-outfit text-white">${g.current}/${g.goal} مشترك</span>
                        </div>
                        <button onclick="joinGroup(${g.id})" class="bg-white/5 border border-white/10 px-6 py-2 rounded-xl text-xs font-bold hover:bg-neon hover:text-dark transition-all font-tajawal">انضمام</button>
                    </div>
                    <button onclick="openGroupChat(${g.id})" class="w-full mt-2 bg-purple-500/10 text-purple-400 py-3 rounded-2xl text-[10px] font-bold border border-purple-500/20 flex items-center justify-center gap-2 hover:bg-purple-500/20 transition-all font-tajawal">
                        <i data-lucide="message-square" class="w-3 h-3"></i>
                        <span>شات القروب</span>
                    </button>
                `;
                listEl.appendChild(card);
            });
            safeCreateIcons();
        }

        function showCreateGroupModal(preFillLoc = '') {
            const modal = document.createElement('div');
            modal.id = 'create-group-modal';
            modal.className = "fixed inset-0 bg-dark/95 z-[500] flex items-center justify-center p-6 fade-in overflow-y-auto";
            modal.dir = "rtl";
            modal.innerHTML = `
                <div class="glass p-8 rounded-[40px] border border-neon/30 max-w-sm w-full space-y-6">
                    <h3 class="text-2xl font-black text-center font-tajawal">إنشاء قروب جديد 🏃‍♂️</h3>
                    <div class="space-y-4">
                        <input id="g-name" type="text" placeholder="اسم القروب (مثلاً: مشي الفجر)" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-neon outline-none text-right placeholder-gray-600">
                        <input id="g-loc" type="text" placeholder="المكان (ممشى...)" value="${preFillLoc}" ${preFillLoc ? 'readonly' : ''} class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-neon outline-none text-right placeholder-gray-600 ${preFillLoc ? 'opacity-50' : ''}">
                        <div class="space-y-1">
                            <label class="text-[10px] text-gray-500 font-bold px-2 uppercase tracking-widest">وقت التمرين ⏰</label>
                            <select id="g-time" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-neon outline-none text-right appearance-none font-outfit">
                                ${Array.from({ length: 48 }, (_, i) => {
                const h = Math.floor(i / 2);
                const m = (i % 2) * 30;
                const ampm = h >= 12 ? 'PM' : 'AM';
                const h12 = h % 12 || 12;
                const timeStr = `${h12.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')} ${ampm}`;
                return `<option value="${timeStr}">${timeStr}</option>`;
            }).join('')}
                            </select>
                        </div>
                        <input id="g-goal" type="number" placeholder="عدد الأشخاص المطلوب" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-neon outline-none text-right placeholder-gray-600">
                    </div>
                    <div class="grid grid-cols-2 gap-4 pt-4">
                        <button onclick="document.getElementById('create-group-modal').remove()" class="bg-white/5 py-4 rounded-2xl font-bold font-tajawal">إلغاء</button>
                        <button onclick="createGroup()" class="bg-neon text-dark py-4 rounded-2xl font-bold shadow-lg font-tajawal">تأكيد الإنشأء</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            safeCreateIcons();
        }

        function createGroup() {
            const name = document.getElementById('g-name').value;
            const loc = document.getElementById('g-loc').value;
            const time = document.getElementById('g-time').value;
            const goal = document.getElementById('g-goal').value;

            if (!name || !loc || !time || !goal) return showToast('يرجى ملء جميع الحقول', 'error');

            const newGroup = {
                id: Date.now(),
                name,
                location: loc,
                time,
                goal: parseInt(goal),
                current: 1,
                creator: ((userData && userData.name) ? userData.name : 'أنت'),
                creatorImg: ((userData && userData.img) ? userData.img : 'assets/male.png'),

                memberData: [],
                messages: []
            };

            ryadiGroups.unshift(newGroup);
            if (db) db.ref('groups').set(ryadiGroups);
            else localStorage.setItem('ryadi_groups', JSON.stringify(ryadiGroups));
            document.getElementById('create-group-modal').remove();
            renderGroups();
            showToast('تم إنشاء القروب بنجاح! شاركه مع الآخرين.');
        }

        function showEditProfile() {
            const modal = document.createElement('div');
            modal.id = 'edit-profile-modal';
            modal.className = "fixed inset-0 bg-dark/95 z-[500] flex items-center justify-center p-6 fade-in";
            modal.dir = "rtl";
            modal.innerHTML = `
                <div class="glass p-8 rounded-[40px] border border-neon/30 max-w-sm w-full space-y-6">
                    <h3 class="text-2xl font-black text-center">تعديل الملف الشخصي 👤</h3>
                    <div class="space-y-4">
                        <div class="flex flex-col items-center gap-4 py-4">
                            <h3 class="text-sm font-bold opacity-60">تغيير الشخصية:</h3>
                            <div class="grid grid-cols-2 gap-4 w-full">
                                <button onclick="selectAvatar('male', true)" class="p-2 glass rounded-[32px] border-2 border-transparent hover:border-neon transition-all">
                                    <div class="w-20 h-20 rounded-2xl overflow-hidden mx-auto mb-1">
                                        <img src="assets/male.png" class="w-full h-full object-cover">
                                    </div>
                                    <span class="text-[10px] font-bold">ولد</span>
                                </button>
                                <button onclick="selectAvatar('female', true)" class="p-2 glass rounded-[32px] border-2 border-transparent hover:border-neon transition-all">
                                    <div class="w-20 h-20 rounded-2xl overflow-hidden mx-auto mb-1">
                                        <img src="assets/female.png" class="w-full h-full object-cover">
                                    </div>
                                    <span class="text-[10px] font-bold">بنت</span>
                                </button>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs text-gray-400 px-2">الاسم:</label>
                            <input id="edit-name" type="text" value="${(userData && userData.name) ? userData.name : ''}" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-neon outline-none text-right">

                        </div>
                        <div class="space-y-1">
                            <label class="text-xs text-gray-400 px-2">النبذة الشخصية (Bio):</label>
                            <textarea id="edit-bio" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 focus:border-neon outline-none text-right h-24 resize-none">${(userData && userData.bio) ? userData.bio : ''}</textarea>

                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="document.getElementById('edit-profile-modal').remove()" class="bg-white/5 py-4 rounded-2xl font-bold">إلغاء</button>
                        <button onclick="saveProfile()" class="bg-neon text-dark py-4 rounded-2xl font-bold">حفظ التغييرات</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function selectAvatar(type, isEditing = false) {
            const maleUrl = "assets/male.png";
            const femaleUrl = "assets/female.png";
            const selectedUrl = type === 'male' ? maleUrl : femaleUrl;

            if (isEditing) {
                tempImgStr = selectedUrl;
                // Add visual feedback in modal if needed, but saveProfile will handle it
                alert('تم اختيار الشخصية بنجاح ✅');
            } else {
                finalObData.img = selectedUrl;
                // Reset styles
                document.getElementById('av-male').className = document.getElementById('av-male').className.replace('border-neon', 'border-transparent');
                document.getElementById('av-female').className = document.getElementById('av-female').className.replace('border-neon', 'border-transparent');
                // Set active
                document.getElementById('av-' + type).classList.remove('border-transparent');
                document.getElementById('av-' + type).classList.add('border-neon');
            }
        }

        function handleImgSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('img-loading').classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    // Resize to 200x200 for cloud storage efficiency
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 200;
                    canvas.height = 200;
                    ctx.drawImage(img, 0, 0, 200, 200);

                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('edit-img-preview').src = base64;
                    tempImgStr = base64;
                    document.getElementById('img-loading').classList.add('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        let tempImgStr = null;

        function saveProfile() {
            const newName = document.getElementById('edit-name').value;
            const newImg = tempImgStr || userData.img;
            const newBio = document.getElementById('edit-bio').value;

            if (!newName) return showToast('الاسم مطلوب', 'error');

            userData.name = newName;
            userData.img = newImg;
            userData.bio = newBio;
            tempImgStr = null;

            // Update Cloud & Local
            if (db) db.ref('users/' + userData.email.replace(/\./g, ',')).set(userData);
            localStorage.setItem('ryadi_user', JSON.stringify(userData));

            document.getElementById('edit-profile-modal').remove();
            renderProfile(); // Need to ensure it re-renders
            switchView('profile'); // Forces re-render
        }

        function completeTask(id) {
            if (!userData.completedTasks) userData.completedTasks = [];
            if (userData.completedTasks.includes(id)) return showToast('أكملت هذه المهمة بالفعل', 'info');

            userData.completedTasks.push(id);
            if (db) db.ref('users/' + userData.email.replace(/\./g, ',')).set(userData);
            localStorage.setItem('ryadi_user', JSON.stringify(userData));

            showToast('تهانينا! تم إنجاز المهمة وإضافتها لسجلك 🏆');
            if (currentView === 'profile') switchView('profile');
        }

        function joinGroup(id) {
            const group = ryadiGroups.find(g => g.id === id);
            if (group) {
                if (group.current >= group.goal) return showToast('عذراً، القروب مكتمل', 'error');

                // Add member to list if not exists
                const isAlreadyMember = group.creatorEmail === (userData ? userData.email : '') || 
                                        (group.memberData && group.memberData.find(m => m.email === (userData ? userData.email : '')));

                if (isAlreadyMember) return showToast('أنت عضو في هذا القروب بالفعل', 'info');

                group.memberData.push({
                    email: userData.email,
                    name: userData.name,
                    img: userData.img
                });
                group.current++;

                if (db) db.ref('groups').set(ryadiGroups);
                else localStorage.setItem('ryadi_groups', JSON.stringify(ryadiGroups));
                renderGroups();
                showToast(`تم انضمامك لقروب "${group.name}". نراكم في ${group.location}!`);
            }
        }

        function openGroupChat(id) {
            currentGroupId = id;
            switchView('group_chat');
        }

        function renderGroupChat() {
            const group = ryadiGroups.find(g => g.id === currentGroupId);
            if (!group) return;

            document.getElementById('group-chat-title').innerText = group.name;
            const listEl = document.getElementById('group-chat-msgs');
            if (!listEl) return;
            listEl.innerHTML = '';

            if (!group.messages || group.messages.length === 0) {
                listEl.innerHTML = '<p class="text-center text-gray-500 py-12 text-xs opacity-50">دردشة خاصة بأعضاء القروب فقط. ابدأ الحديث!</p>';
                return;
            }

            group.messages.forEach(m => {
                const item = document.createElement('div');
                const isMe = m.user === ((userData && userData.name) ? userData.name : 'أنت');

                item.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                item.innerHTML = `
                    <div class="max-w-[80%] ${isMe ? 'bg-purple-600 text-white rounded-r-2xl rounded-bl-2xl' : 'bg-white/5 text-white rounded-l-2xl rounded-br-2xl'} p-4">
                        <p class="text-[9px] font-bold opacity-60 mb-1">${m.user}</p>
                        <p class="text-sm">${m.msg}</p>
                        <p class="text-[7px] opacity-40 mt-1">${m.time}</p>
                    </div>
                `;
                listEl.appendChild(item);
            });
            listEl.scrollTo(0, listEl.scrollHeight);
            safeCreateIcons();
        }

        function sendGroupMsg() {
            const input = document.getElementById('group-chat-input');
            if (!input.value.trim()) return;

            const group = ryadiGroups.find(g => g.id === currentGroupId);
            if (group) {
                if (!group.messages) group.messages = [];
                group.messages.push({
                    user: ((userData && userData.name) ? userData.name : 'أنت'),

                    msg: input.value,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                if (db) db.ref('groups').set(ryadiGroups);
                else localStorage.setItem('ryadi_groups', JSON.stringify(ryadiGroups));
                input.value = '';
                renderGroupChat();
            }
        }

        window.onload = () => {
            // Priority: Load UI first to clear loading spinner
            setTimeout(() => {
                try {
                    if (!userData) {
                        switchView('onboarding');
                    } else {
                        switchView('home'); 
                        renderNavbar();
                        
                        // Background logic
                        try { initCloudSync(); } catch(e) {}
                        try { syncUserData(); } catch(e) {}
                        try { resumeTracking(); } catch(e) {}
                        
                        // GPS Request after UI is ready
                        getUserLocation();
                    }
                } catch (e) {
                    console.error("Initialization error:", e);
                    // Critical fallback: show something
                    switchView('onboarding');
                }
            }, 50);
        };


    </script>
</body>

</html>
